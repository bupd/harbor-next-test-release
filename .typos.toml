# Configuration for typos spell checker
# https://github.com/crate-ci/typos

[default]
extend-ignore-identifiers-re = [
    # Base64 encoded data patterns
    "[A-Za-z0-9+/]{20,}",
]

[default.extend-words]
# Harbor-specific and common tech abbreviations
cfg = "cfg"
ctx = "ctx"
req = "req"
resp = "resp"
impl = "impl"
init = "init"
# Harbor component names
registryctl = "registryctl"
jobservice = "jobservice"
# Container/OCI terminology
oci = "oci"
oras = "oras"

[files]
extend-exclude = [
    # Certificate and key files
    "*.pem",
    "*.crt",
    "*.key",

    # Upstream Harbor source - not ours to fix
    "src/",
    "api/",
    "make/",
    "tools/",
    "tests/",
    "devenv/",
    "dockerfile/",
    "contrib/",

    # Upstream adopter/contributor files with company names and non-English brands
    "ADOPTERS.md",
    "CONTRIBUTORS.md",
    "CHANGELOG.md",

    # Vendor and generated artifacts
    "vendor/",
    "node_modules/",
    "dist/",
    "bin/",
    "go.sum",
    "bun.lock",
    "package-lock.json",
]

[type.md]
extend-ignore-re = [
    # URLs
    "https?://[^\\s]+",
    # Code blocks
    "```[\\s\\S]*?```",
    # Inline code
    "`[^`]+`",
]
