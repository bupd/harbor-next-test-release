name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  prepare:
    name: Prepare Source
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      has_patches: ${{ steps.patches.outputs.has_patches }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install stgit
        if: ${{ vars.PATCHES_REPO != '' }}
        uses: taiki-e/install-action@205eb1d74c6feda89abb1f3a09360601953286c0 # v2.68.18
        with:
          tool: stgit

      - name: Prepare stgit stack
        if: ${{ vars.PATCHES_REPO != '' }}
        run: |
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name "Release Bot"
          git checkout -b release-build
          stg init

      - name: Fetch and apply enterprise patches
        id: patches
        if: ${{ vars.PATCHES_REPO != '' }}
        env:
          PATCHES_TOKEN: ${{ secrets.PATCHES_TOKEN }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PATCHES_TOKEN}@github.com/${{ vars.PATCHES_REPO }}" \
            /tmp/patches-repo
          stg import -S /tmp/patches-repo/8gcr-ee/patches/series
          stg series --description > applied-patches.txt
          git diff ${{ needs.release-please.outputs.tag_name }}..HEAD > enterprise.patch
          echo "has_patches=true" >> "$GITHUB_OUTPUT"

      - name: Upload enterprise patches
        if: ${{ steps.patches.outputs.has_patches == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: enterprise-patches
          path: |
            enterprise.patch
            applied-patches.txt
          retention-days: 1

  build:
    name: "${{ matrix.component }} (${{ matrix.platform }})"
    needs: [release-please, prepare]
    strategy:
      fail-fast: false
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter, nginx]
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Download enterprise patches
        if: ${{ needs.prepare.outputs.has_patches == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: enterprise-patches

      - name: Apply enterprise patches
        if: ${{ needs.prepare.outputs.has_patches == 'true' }}
        run: git apply enterprise.patch

      - name: Load versions
        run: cat versions.env >> "$GITHUB_ENV"

      - name: Setup Go
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter"]'), matrix.component) }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install Task
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter"]'), matrix.component) }}
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API code
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter"]'), matrix.component) }}
        run: task build:gen-apis

      - name: Compile Go binary
        if: ${{ contains(fromJSON('["core","jobservice","registryctl","exporter"]'), matrix.component) }}
        run: task build:binary:${{ matrix.component }}:${{ env.PLATFORM_PAIR }} GIT_COMMIT="${GITHUB_SHA:0:8}"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: dockerfile/${{ matrix.component }}.dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
            LPROBE_VERSION=${{ env.LPROBE_VERSION }}
            NGINX_VERSION=${{ env.NGINX_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            GO_VERSION=${{ env.GO_VERSION }}
            DISTRIBUTION_VERSION=${{ env.DISTRIBUTION_VERSION }}
            TRIVY_VERSION=${{ env.TRIVY_VERSION }}
            TRIVY_BASE_IMAGE_VERSION=${{ env.TRIVY_BASE_IMAGE_VERSION }}
            HARBOR_SCANNER_TRIVY_VERSION=${{ env.HARBOR_SCANNER_TRIVY_VERSION }}
          tags: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digest-${{ matrix.component }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: "Merge ${{ matrix.component }}"
    needs: [release-please, build]
    strategy:
      matrix:
        component: [core, jobservice, registryctl, exporter, portal, registry, trivy-adapter, nginx]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.REGISTRY_ADDRESS }}/${{ env.REGISTRY_PROJECT }}/harbor-${{ matrix.component }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            $(printf "${IMAGE}@sha256:%s " *)

  sign:
    name: Sign and Release
    needs: [release-please, prepare, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      REGISTRY_ADDRESS: ${{ vars.REGISTRY_ADDRESS || '8gears.container-registry.com' }}
      REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT || '8gcr' }}
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_ADDRESS }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign images
        run: |
          for image in core jobservice registryctl exporter portal registry trivy-adapter nginx; do
            cosign sign --yes \
              "${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}/harbor-${image}:${VERSION}"
          done

      - name: Download enterprise patches info
        if: ${{ needs.prepare.outputs.has_patches == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: enterprise-patches

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY="${REGISTRY_ADDRESS}/${REGISTRY_PROJECT}"
          IMAGES="core jobservice registryctl exporter portal registry trivy-adapter nginx"

          HIGHLIGHTS=""
          # shellcheck disable=SC2016
          PREV_TAG=$(gh release list --limit 20 --json tagName \
            --jq --arg t "${TAG_NAME}" '[.[] | .tagName | select(. != $t)] | .[0]')
          if [ -n "${PREV_TAG}" ]; then
            SINCE=$(gh release view "${PREV_TAG}" --json createdAt -q '.createdAt')
            SINCE_DATE="${SINCE%T*}"
            HIGHLIGHTS=$(gh pr list \
              --state merged \
              --base main \
              --search "merged:>=${SINCE_DATE}" \
              --json number,title,url,body \
              --limit 100 \
              --jq '
                [.[] | select(.body | test("(?m)^## Release Notes"))] |
                if length == 0 then ""
                else
                  "## Highlights\n\n" +
                  (map(
                    "### [#\(.number)](\(.url)) \(.title)\n" +
                    (.body |
                      gsub("(?s).*\n## Release Notes\n"; "") |
                      gsub("(?s)\n## .*"; "") |
                      gsub("<!--[\\s\\S]*?-->"; "") |
                      ltrimstr("\n") | rtrimstr("\n")
                    ) + "\n"
                  ) | join("\n"))
                end
              ')
          fi

          {
            if [ -n "${HIGHLIGHTS}" ]; then
              printf '%s\n\n' "${HIGHLIGHTS}"
            fi
            if [ -f applied-patches.txt ] && [ -s applied-patches.txt ]; then
              echo "## Enterprise Features"
              echo ""
              echo "This release includes the following enterprise enhancements:"
              # shellcheck disable=SC2001
              while IFS= read -r line; do
                desc=$(echo "$line" | sed 's/^[>+] [^ ]* *//')
                [ -n "$desc" ] && echo "- ${desc}"
              done < applied-patches.txt
              echo ""
            fi
            echo "## Container Images"
            echo ""
            echo "Multi-arch images (\`linux/amd64\`, \`linux/arm64\`) signed with [cosign](https://github.com/sigstore/cosign)."
            echo ""
            echo "| Image | Reference |"
            echo "|-------|-----------|"
            for image in $IMAGES; do
              echo "| \`harbor-${image}\` | \`${REGISTRY}/harbor-${image}:${TAG_NAME}\` |"
            done
            echo ""
            echo "**Verify an image signature:**"
            echo "\`\`\`sh"
            echo "cosign verify \\"
            echo "  --certificate-identity \"https://github.com/${{ github.repository }}/.github/workflows/release-please.yml@refs/heads/main\" \\"
            echo "  --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" \\"
            echo "  ${REGISTRY}/harbor-core:${TAG_NAME}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo ""
            gh release view "${TAG_NAME}" --json body -q .body
          } | gh release edit "${TAG_NAME}" --notes-file -
