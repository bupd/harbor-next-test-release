name: Spell Check

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.txt'
      - '**.yml'
      - '**.yaml'
      - '.typos.toml'
  pull_request:
    paths:
      - '**.md'
      - '**.txt'
      - '**.yml'
      - '**.yaml'
      - '.typos.toml'

permissions:
  contents: read

jobs:
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master
        with:
          config: .typos.toml
          files: >-
            .github
            taskfile
            CLAUDE.md
            CHANGELOG.md
            README.md
            lefthook.yml
            Taskfile.yml
            versions.env
